            薛之谦（Joker
            Xue），1983年7月17日出生于上海市，华语流行乐男歌手、影视演员、词曲作者、音乐制作人，毕业于瑞士格里昂酒店管理学院。2005年，薛之谦因参加音乐选秀节目《我型我秀》而正式出道。2006年，发行个人首张音乐专辑《薛之谦》，并凭借其中的歌曲《认真的雪》获得广泛关注。2007年，发行的音乐专辑《你过得好吗》取得突破15万张的首月销量。
